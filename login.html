<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran - NATUNA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#FAFAFA] min-h-screen flex items-center justify-center p-6 text-black">

    <form action="#" method="post" class="w-full max-w-md bg-white p-10 border border-gray-200">
        
        <div class="mb-10 text-center">
            <h3 class="text-3xl font-light tracking-widest uppercase text-black">LOGIN</h3>
            <h6 class="text-xs font-light tracking-widest uppercase text-gray-500">NATUNA GAS</h6>
            <div class="w-12 h-[1px] bg-black mx-auto mt-4"></div>
        </div>
        

        <div class="mb-7 relative">
            <label for="email" class="block text-[10px] font-semibold uppercase tracking-widest text-gray-500 mb-1">username</label>
            <input type="input" id="username" placeholder="Masukan username" 
                class="w-full py-2 bg-transparent border-b border-gray-300 text-sm text-black placeholder-gray-300 focus:outline-none focus:border-black transition-colors duration-300 rounded-none">
        </div>
        
        
        <div class="mb-7 relative">
            <label for="password" class="block text-[10px] font-semibold uppercase tracking-widest text-gray-500 mb-1">Password</label>
            <input type="password" id="password" placeholder="Masukan Password (8 Karakter)" 
                class="w-full py-2 bg-transparent border-b border-gray-300 text-sm text-black placeholder-gray-300 focus:outline-none focus:border-black transition-colors duration-300 rounded-none">
        </div>

        <button type="submit" 
            class="w-full py-3.5 bg-black text-white text-xs font-semibold border border-black hover:bg-[#222] transition-all duration-300">
            Masuk
        </button>
        
        <div class="text-center text-xs text-gray pt-4">Belum memiliki akun?  <span class="text-[#4682B4] font-semibold border-black pb-1"><a href="index.html">Chat ke WA Admin</a></span></div>
    </form>



</body>
</html>
